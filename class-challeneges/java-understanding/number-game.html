<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess the Number (1-100)</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
    input { padding: 10px; font-size: 18px; width: 100px; }
    button { padding: 10px 20px; font-size: 18px; margin: 10px; }
    #message { font-size: 22px; margin: 20px; min-height: 30px; }
  </style>
</head>
<body>
  <h1>Guess the Number Game</h1>
  <p>I'm thinking of a number between <strong>1 and 100</strong>.<br>
     Try to guess it in as few attempts as possible!</p>

  <input type="number" id="guessInput" placeholder="Enter your guess" min="1" max="100">
  <button onclick="makeGuess()">Submit Guess</button>
  <button onclick="resetGame()">New Game</button>

  <div id="message"></div>
  <div id="attempts">Attempts: 0</div>

  <script>
    let secretNumber = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;

    function makeGuess() {
      const guess = Number(document.getElementById('guessInput').value);
      const messageEl = document.getElementById('message');
      const attemptsEl = document.getElementById('attempts');

      if (isNaN(guess) || guess < 1 || guess > 100) {
        messageEl.textContent = "❌ Please enter a number between 1 and 100!";
        return;
      }

      attempts++;
      attemptsEl.textContent = `Attempts: ${attempts}`;

      if (guess === secretNumber) {
        messageEl.innerHTML = `🎉 Congratulations! You guessed it in <strong>${attempts}</strong> attempts!`;
        messageEl.style.color = "green";
      } 
      else if (guess < secretNumber) {
        messageEl.textContent = "📉 Too low! Try a higher number.";
        messageEl.style.color = "blue";
      } 
      else {
        messageEl.textContent = "📈 Too high! Try a lower number.";
        messageEl.style.color = "red";
      }

      // Clear input for next guess
      document.getElementById('guessInput').value = '';
      document.getElementById('guessInput').focus();
    }

    function resetGame() {
      secretNumber = Math.floor(Math.random() * 100) + 1;
      attempts = 0;
      document.getElementById('message').textContent = '';
      document.getElementById('attempts').textContent = 'Attempts: 0';
      document.getElementById('guessInput').value = '';
      document.getElementById('guessInput').focus();
    }

    // Allow pressing Enter key
    document.getElementById('guessInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        makeGuess();
      }
    });
  </script>
</body>
</html>
